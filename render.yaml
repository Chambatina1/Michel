services:
  - type: web
    name: ps-medical-devices
    runtime: node
    plan: starter
    repo: https://github.com/Chambatina1/Michel.git
    branch: main
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: mkdir -p db && npx prisma db push --skip-generate 2>/dev/null; node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/app/db/custom.db
    healthCheckPath: /
    region: florida
