services:
  - type: web
    name: ps-medical-devices
    runtime: node
    plan: standard
    repo: https://github.com/Chambatina1/Michel.git
    branch: main
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /
    region: oregon
