services:
  - type: web
    name: ps-medical-devices
    runtime: node
    plan: starter
    repo: https://github.com/Chambatina1/Michel.git
    branch: main
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --skip-generate && node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: michel-db
          property: connectionString
      - key: DIRECT_DATABASE_URL
        fromDatabase:
          name: michel-db
          property: internalConnectionString
    healthCheckPath: /
    region: florida
